name: Quota Reset

on:
  schedule:
    # Daily at 台北 04:00 (UTC 20:00 previous day) — after geo-audit cron
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quota-reset
  cancel-in-progress: false

jobs:
  reset:
    name: Reset monthly audit quotas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Reset quotas past their date
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/quota_reset.py

      - name: Summary
        if: always()
        run: |
          echo "## Quota Reset" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
